# Builds the site and publishes dist/ to the gh-pages branch, which GitHub
# Pages serves at orbintelligence.co. Runs on every push to main (and to the
# current feature branch until it merges). `npm run deploy` from a local
# machine remains a valid manual alternative — both produce the same output.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/25-negatives-positioning-23d99g
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # The build's prerender step needs Node >= 22.6 (--experimental-strip-types).
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Publish dist/ to gh-pages
        run: |
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy site from ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
